<title>Annuler mon rendez-vous – Technik-Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0d1b2a;
    --blue: #1a73c8;
    --blue-light: #3a9bdc;
    --orange: #f5a623;
    --white: #f8f9fb;
    --gray: #8a97a8;
    --card-bg: #162233;
    --border: rgba(255,255,255,0.07);
    --red: #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  main {
    max-width: 460px;
    width: 100%;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 1.6rem;
    display: block;
    color: var(--white);
    text-decoration: none;
  }
  .logo span { color: var(--orange); }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 0.02em;
    margin-bottom: 0.8rem;
  }

  .detail-row {
    margin-bottom: 0.8rem;
  }
  .detail-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray);
    margin-bottom: 0.2rem;
  }
  .detail-value {
    font-size: 1rem;
  }

  .btn-cancel {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1.2rem;
    transition: opacity .2s, transform .15s;
  }
  .btn-cancel:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }

  .state-message {
    text-align: center;
    color: var(--gray);
    padding: 1rem 0;
  }
  .state-message.success { color: #4ade80; }
  .state-message.error { color: var(--red); }

  a.back-link {
    display: block;
    text-align: center;
    margin-top: 1.4rem;
    color: var(--gray);
    font-size: 0.85rem;
    text-decoration: none;
  }
  a.back-link:hover { color: var(--white); }
</style>
</head>
<body>

<main>
  <a href="/" class="logo">TECHNIK<span>-HOME</span></a>

  <div class="card">
    <div id="content">
      <div class="state-message">Chargement de votre rendez-vous…</div>
    </div>
  </div>

  <a href="/" class="back-link">← Retour au site</a>
</main>

<script>
const SUPABASE_URL = 'https://gzrqkapwjwlwkvwtykfi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_EKs2eR3Du9MYSnUgeTFtBQ_vnOOFqHt';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SLOT_LABELS = { matin: 'Matin (10h-12h)', apresmidi: 'Après-midi (12h-18h)' };

function dateFr(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function init(){
  const params = new URLSearchParams(window.location.search);
  const appId = params.get('id');
  const content = document.getElementById('content');

  if(!appId){
    content.innerHTML = '<div class="state-message error">Lien invalide. Merci de nous contacter directement au 07 59 70 54 97.</div>';
    return;
  }

  try{
    const { data, error } = await sb.from('rdv').select('*').eq('app_id', appId).single();
    if(error || !data){
      content.innerHTML = '<div class="state-message error">Rendez-vous introuvable. Il a peut-être déjà été annulé, ou le lien est incorrect.</div>';
      return;
    }

    if(data.statut === 'annule'){
      content.innerHTML = '<div class="state-message">Ce rendez-vous est déjà annulé.</div>';
      return;
    }

    if(data.statut === 'effectue'){
      content.innerHTML = '<div class="state-message">Ce rendez-vous a déjà eu lieu, il ne peut plus être annulé en ligne. Pour toute question, contactez-nous au 07 59 70 54 97.</div>';
      return;
    }

    content.innerHTML = `
      <h1>Annuler mon rendez-vous</h1>
      <div class="detail-row">
        <div class="detail-label">Date</div>
        <div class="detail-value">${escapeHtml(dateFr(data.date))}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Créneau</div>
        <div class="detail-value">${escapeHtml(SLOT_LABELS[data.creneau] || data.creneau || '')}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Intervention</div>
        <div class="detail-value">${escapeHtml(data.appareil || '')}</div>
      </div>
      <button class="btn-cancel" id="confirm-cancel-btn">🚫 Confirmer l'annulation</button>
    `;

    document.getElementById('confirm-cancel-btn').addEventListener('click', async () => {
      const btn = document.getElementById('confirm-cancel-btn');
      btn.disabled = true;
      btn.textContent = 'Annulation en cours…';
      try{
        const { error: updateError } = await sb.from('rdv').update({ statut: 'annule' }).eq('app_id', appId);
        if(updateError) throw updateError;
        content.innerHTML = '<div class="state-message success">✅ Votre rendez-vous a bien été annulé. Vous pouvez reprendre rendez-vous à tout moment depuis notre site.</div>';
      }catch(e){
        console.error('Erreur annulation :', e);
        content.innerHTML = '<div class="state-message error">Une erreur est survenue. Merci de nous contacter au 07 59 70 54 97.</div>';
      }
    });
  }catch(e){
    console.error('Erreur chargement RDV :', e);
    content.innerHTML = '<div class="state-message error">Une erreur est survenue. Merci de nous contacter au 07 59 70 54 97.</div>';
  }
}

init();
</script>
</body>
</html>
